<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0e0a" />
  <title>📊 SITREP — Business Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
</head>
<body>
  <div class="scanlines"></div>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">◉ SITREP</div>
      <div class="subtitle" id="pageSubtitle">BUSINESS DASHBOARD — MULTI-APPLICATION</div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- NAV -->
  <nav style="display:flex;align-items:center;gap:18px;padding:4px 18px;background:#0d100d;border-bottom:1px solid #1a2e1a;font-size:12px;letter-spacing:1.5px;">
    <a href="index.html" style="color:#b0c4b0;text-decoration:none;">▸ DASHBOARD</a>
    <a href="infra.html" style="color:#b0c4b0;text-decoration:none;">▸ CARTOGRAPHIE</a>
    <a href="admin.html" style="color:#00ff41;text-decoration:none;font-weight:bold;">▸ BUSINESS</a>
    <a href="monitoring.html" style="color:#b0c4b0;text-decoration:none;">▸ MONITORING</a>
    <a href="index.html#incidentLog" style="color:#b0c4b0;text-decoration:none;">▸ INCIDENTS</a>
  </nav>

  <!-- APP SELECTOR TABS -->
  <div id="appTabs" style="display:flex;align-items:center;gap:0;padding:0 18px;background:#0a0e0a;border-bottom:2px solid #1a2e1a;font-size:12px;">
    <div style="color:#5a6e5a;padding:10px 14px;letter-spacing:1px;font-size:10px;">CHARGEMENT DES APPLICATIONS...</div>
  </div>

  <!-- KPI BAR — dynamically populated per app -->
  <div class="status-bar" id="statusBar" style="display:none;">
  </div>

  <!-- MAIN CONTENT — dynamically populated per app -->
  <main id="mainContent" style="padding:16px;display:flex;flex-direction:column;gap:16px;">
    <div style="text-align:center;padding:60px 20px;color:#5a6e5a;">
      <div style="font-size:48px;margin-bottom:16px;">📊</div>
      <div style="font-size:14px;letter-spacing:2px;">SÉLECTIONNER UNE APPLICATION</div>
    </div>
  </main>

  <script src="admin-app.js"></script>
</body>
</html>
